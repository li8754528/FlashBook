<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashBook - 记账本</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>📒 FlashBook</h1>
      <div class="overview" id="overview">
        <div class="stat"><span class="label">今日</span><span class="value" id="todayTotal">¥0</span></div>
        <div class="stat"><span class="label">本月</span><span class="value" id="monthTotal">¥0</span></div>
        <div class="stat"><span class="label">总金额</span><span class="value" id="totalAmount">¥0</span></div>
      </div>
    </header>

    <main class="main">
      <section class="section charts-section">
        <h2>📊 统计分析</h2>
        <div class="charts-filters">
          <select id="statsYear"></select>
          <select id="statsMonth">
            <option value="">全年</option>
            <option value="01">1月</option>
            <option value="02">2月</option>
            <option value="03">3月</option>
            <option value="04">4月</option>
            <option value="05">5月</option>
            <option value="06">6月</option>
            <option value="07">7月</option>
            <option value="08">8月</option>
            <option value="09">9月</option>
            <option value="10">10月</option>
            <option value="11">11月</option>
            <option value="12">12月</option>
          </select>
        </div>
        <div class="charts-grid">
          <div class="chart-card">
            <h3 id="dailyChartTitle">每日消费</h3>
            <canvas id="dailyChart"></canvas>
          </div>
          <div class="chart-card">
            <h3>分类统计</h3>
            <canvas id="categoryChart"></canvas>
          </div>
        </div>
      </section>

      <section class="section bills-section">
        <h2>📋 账单列表</h2>
        <div class="filters">
          <input type="month" id="filterMonth" />
          <select id="filterCategory">
            <option value="">全部分类</option>
          </select>
        </div>
        <div class="bills-list" id="billsList"></div>
        <div class="pagination" id="pagination"></div>
      </section>
    </main>

    <nav class="tab-bar">
      <button class="tab active" data-tab="charts">📊 统计</button>
      <button class="tab" data-tab="bills">📋 账单</button>
    </nav>

    <!-- 编辑弹窗 -->
    <div class="modal" id="editModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>编辑账单</h3>
          <button class="modal-close" onclick="closeEditModal()">&times;</button>
        </div>
        <form id="editForm">
          <input type="hidden" id="editId">
          <div class="form-group">
            <label>金额 *</label>
            <input type="number" id="editAmount" step="0.01" required>
          </div>
          <div class="form-group">
            <label>日期 *</label>
            <input type="date" id="editDate" required>
          </div>
          <div class="form-group">
            <label>分类</label>
            <select id="editCategory"></select>
          </div>
          <div class="form-group">
            <label>描述</label>
            <input type="text" id="editDescription">
          </div>
          <div class="form-group">
            <label>商家</label>
            <input type="text" id="editMerchant">
          </div>
          <div class="form-group">
            <label>地点</label>
            <input type="text" id="editLocation">
          </div>
          <div class="form-group">
            <label>支付方式</label>
            <select id="editPayment">
              <option value="">请选择</option>
              <option value="现金">现金</option>
              <option value="微信">微信</option>
              <option value="支付宝">支付宝</option>
              <option value="银行卡">银行卡</option>
              <option value="信用卡">信用卡</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="button" class="btn-cancel" onclick="closeEditModal()">取消</button>
            <button type="submit" class="btn-save">保存</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal" id="deleteModal">
      <div class="modal-content modal-small">
        <div class="modal-body">
          <p>确定要删除这条账单吗？</p>
          <p class="delete-info" id="deleteInfo"></p>
        </div>
        <div class="form-actions">
          <button class="btn-cancel" onclick="closeDeleteModal()">取消</button>
          <button class="btn-delete" id="confirmDelete">删除</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
